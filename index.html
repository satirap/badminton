<style>
/* =================================================================
   DESIGN SYSTEM
   Sporty-editorial: dark ground, neon accent, confident type
   ================================================================= */
:root {
  --bg:       #0e0f11;
  --bg-card:  #181a1e;
  --bg-input: #1f2228;
  --ink:      #e8e6e1;
  --ink-soft: #9b9a95;
  --ink-mute: #5c5b57;
  --line:     #2a2c31;
  --accent:   #c6f135;
  --accent-dim:#c6f13530;
  --danger:   #f14e4e;
  --gold:     #ffd644;
  --silver:   #b8c0cc;
  --bronze:   #d4915e;
  --radius:   16px;
  --radius-sm:12px;
  --shadow:   0 2px 20px -8px #000a;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background: var(--bg);
  color: var(--ink);
  font-family:'DM Sans', system-ui, sans-serif;
  font-size:16px;
  line-height:1.45;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
}

/* ---- App shell ---- */
.app{max-width:480px;margin:0 auto;padding:0 16px 100px;position:relative}

/* ---- Loading / splash ---- */
#splash{
  position:fixed;inset:0;z-index:200;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;
  transition:opacity .4s ease;
}
#splash.hide{opacity:0;pointer-events:none}
#splash .logo{font-family:'Instrument Serif',serif;font-size:48px;letter-spacing:-.03em}
#splash .dot{display:inline-block;width:10px;height:10px;background:var(--accent);border-radius:50%;margin:0 1px 6px 2px}
#splash .sub{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft)}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
#splash .loading{animation:pulse 1.2s ease infinite}

/* ---- Header ---- */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 0 14px;
  border-bottom:1px solid var(--line);
  margin-bottom:6px;
}
.header .brand{
  font-family:'Instrument Serif',serif;
  font-size:28px;letter-spacing:-.02em;
  display:flex;align-items:center;gap:1px;
}
.header .brand .dot{display:inline-block;width:7px;height:7px;background:var(--accent);border-radius:50%;margin:0 1px 4px 1px}
.header .user-info{display:flex;align-items:center;gap:10px}
.header .user-info img{width:34px;height:34px;border-radius:50%;border:2px solid var(--accent);object-fit:cover}
.header .user-info .uname{font-size:13px;font-weight:600;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header .logout{
  background:none;border:1px solid var(--line);color:var(--ink-mute);
  font-size:11px;padding:6px 10px;border-radius:8px;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;letter-spacing:.08em;text-transform:uppercase;
}

/* ---- Tab bar — 3 columns ---- */
.tabs{
  position:sticky;top:0;z-index:20;
  background:var(--bg);
  border-bottom:1px solid var(--line);
  display:grid;grid-template-columns:repeat(3,1fr);
  margin:0 -16px;padding:0 4px;
}
.tab{
  appearance:none;border:0;background:transparent;
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-mute);padding:14px 2px 12px;cursor:pointer;
  position:relative;transition:color .2s;
}
.tab[aria-selected="true"]{color:var(--accent)}
.tab[aria-selected="true"]::after{
  content:'';position:absolute;left:16%;right:16%;bottom:-1px;
  height:3px;background:var(--accent);border-radius:2px 2px 0 0;
}

/* ---- Views ---- */
section.view{display:none;animation:fadeUp .25s ease}
section.view.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.section-title{
  font-family:'Instrument Serif',serif;font-size:32px;
  letter-spacing:-.02em;margin:20px 0 16px;line-height:1.1;
}
.section-title em{font-style:italic;color:var(--ink-soft)}

/* ---- Ranking rows ---- */
.rank-list{display:flex;flex-direction:column;gap:6px}
.rank-row{
  display:grid;grid-template-columns:40px 1fr auto;align-items:center;gap:10px;
  background:var(--bg-card);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:12px 14px;
  position:relative;overflow:hidden;
}
.rank-row .pos{
  font-family:'Instrument Serif',serif;font-weight:400;
  font-size:22px;text-align:center;color:var(--ink-soft);line-height:1;
}
.rank-row .pos .pos-num{
  font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;
  color:var(--ink-soft);
}
.rank-row .info{min-width:0;display:flex;flex-direction:column;gap:5px}
.rank-row .info .n{
  font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.rank-row .info .n img{width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0}
.rank-row .info .stat-badges{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.rank-row .badge-w{
  display:inline-flex;align-items:center;gap:3px;
  background:#16a34a22;color:#4ade80;
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:4px;border:1px solid #4ade8033;letter-spacing:.04em;
}
.rank-row .badge-l{
  display:inline-flex;align-items:center;gap:3px;
  background:#dc262622;color:#f87171;
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:4px;border:1px solid #f8717133;letter-spacing:.04em;
}
.rank-row .wr-wrap{display:flex;align-items:center;gap:5px}
.rank-row .wr-bar{
  width:48px;height:4px;border-radius:2px;
  background:var(--line);overflow:hidden;flex-shrink:0;
}
.rank-row .wr-fill{height:100%;border-radius:2px;background:var(--accent)}
.rank-row .wr-txt{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  color:var(--ink-mute);letter-spacing:.04em;
}
.rank-row .pts{
  font-family:'Instrument Serif',serif;font-size:26px;text-align:right;
  line-height:1;white-space:nowrap;
}
.rank-row .pts small{
  font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--ink-mute);display:block;margin-top:1px;
}

/* Podium highlights */
.rank-row.p1{background:linear-gradient(105deg,var(--bg-card) 50%,#c6f13520 100%);border-color:var(--accent)}
.rank-row.p1 .pos{color:var(--accent)}
.rank-row.p2{border-color:var(--silver)}
.rank-row.p2 .pos{color:var(--silver)}
.rank-row.p3{border-color:var(--bronze)}
.rank-row.p3 .pos{color:var(--bronze)}

/* ---- Login screen ---- */
#view-login{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:70dvh;gap:24px;text-align:center;
}
#view-login .hero{

  letter-spacing:-.03em;line-height:.95;

#view-login .hero .dot{display:inline-block;width:12px;height:12px;background:var(--accent);border-radius:50%;margin:0 1px 8px 2px}
#view-login .tagline{color:var(--ink-soft);font-size:15px;max-width:260px;margin:0 auto}
#view-login .login-wrap{width:100%;max-width:320px}

/* ---- Buttons ---- */
.btn{
  appearance:none;border:1.5px solid var(--line);
  background:var(--bg-input);color:var(--ink);
  font-family:inherit;font-weight:600;font-size:16px;
  padding:16px 18px;width:100%;border-radius:var(--radius-sm);
  cursor:pointer;transition:transform .06s,background .15s;
  min-height:54px;
}
.btn:active{transform:translateY(1px)}
.btn.line-btn{
  background:#06c755;color:#fff;border-color:#06c755;
  font-size:17px;display:flex;align-items:center;justify-content:center;gap:10px;
  min-height:58px;border-radius:var(--radius);
}
.btn.line-btn svg{flex-shrink:0}

/* ---- Toast ---- */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(40px);
  background:var(--accent);color:#111;
  padding:12px 20px;border-radius:100px;
  font-family:'IBM Plex Mono',monospace;font-size:12px;
  letter-spacing:.1em;text-transform:uppercase;font-weight:600;
  opacity:0;transition:transform .3s cubic-bezier(.2,.9,.3,1.3),opacity .3s;
  z-index:50;pointer-events:none;box-shadow:0 10px 30px -10px #000a;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---- Empty state ---- */
.empty{
  text-align:center;padding:40px 20px;
  color:var(--ink-mute);font-style:italic;
  font-family:'Instrument Serif',serif;font-size:16px;
}

/* ---- Monthly winners grid ---- */
.winners-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px;
}
.winner-card{
  background:var(--bg-card);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:12px 8px;text-align:center;
}
.winner-card.has-winner{border-color:var(--accent)}
.winner-card.cur-month{background:linear-gradient(135deg,var(--bg-card) 50%,#c6f13512 100%)}
.winner-card .mo{
  font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;
  letter-spacing:.15em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:8px;
}
.winner-card img{
  width:44px;height:44px;border-radius:50%;object-fit:cover;
  border:2px solid var(--accent);margin:0 auto 6px;display:block;
}
.winner-card .no-pic{
  width:44px;height:44px;border-radius:50%;background:var(--bg-input);
  border:2px solid var(--line);margin:0 auto 6px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
}
.winner-card .wname{
  font-size:11px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.winner-card .wpts{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink-mute);margin-top:2px}
.winner-card.empty-slot .mo{color:var(--line)}

/* ---- Utility ---- */
.text-mute{color:var(--ink-mute)}
.text-sm{font-size:13px}

/* Small screens */
@media(max-width:360px){
  .section-title{font-size:26px}
}
</style>

<script>
/* =================================================================
   SHUTTLE — BADMINTON TRACKER v2.0
   LINE LIFF + Firebase Firestore
   ================================================================= */

// =================================================================
// ⚙️ CONFIG — แก้ค่าหลัง setup Firebase
// =================================================================
const LIFF_ID = '2009832825-of9TI64X';

const FIREBASE_CONFIG = {
  apiKey:            'AIzaSyCi2kIvaA9zk_2whDe-SlHW9ngnVWuIhEQ',
  authDomain:        'badminton-642a3.firebaseapp.com',
  projectId:         'badminton-642a3',
  storageBucket:     'badminton-642a3.firebasestorage.app',
  messagingSenderId: '65806979876',
  appId:             '1:65806979876:web:3ee9d17c6f0ede5b2819b1',
};

// =================================================================
// FIREBASE INIT
// =================================================================
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

// =================================================================
// STATE
// =================================================================
let currentUser        = null;
let allRankings        = [];
let allDailyRankings   = [];
let allMonthlyRankings = [];
let allMonthlyWinners  = [];
let _resultHandled     = false;

// =================================================================
// DOM helpers
// =================================================================
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => [...document.querySelectorAll(sel)];
function escHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function toast(msg, duration=2800){
  const el=$('#toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toast._t); toast._t=setTimeout(()=>el.classList.remove('show'), duration);
}

function tsToDate(val){
  if(!val) return new Date(0);
  if(val instanceof Date) return val;
  if(typeof val.toDate === 'function') return val.toDate();
  return new Date(0);
}

// =================================================================
// FIREBASE OPERATIONS
// =================================================================

/**
 * Register / update player in Firestore
 * Document key = lineUserId for easy lookup
 */
async function dbRegisterPlayer(lineUserId, name, pictureUrl){
  const ref  = db.collection('players').doc(lineUserId);
  const snap = await ref.get();
  const isNew = !snap.exists;

  if(isNew){
    await ref.set({
      id: lineUserId,
      name,
      pictureUrl: pictureUrl || '',
      totalPoints: 0,
      wins: 0,
      losses: 0,
      played: 0,
      createdAt: new Date(),
    });
  } else {
    // Update display name / pic in case they changed in LINE
    await ref.update({ name, pictureUrl: pictureUrl || '' });
  }

  const data = isNew
    ? { id: lineUserId, name, pictureUrl: pictureUrl || '', totalPoints: 0, wins: 0, losses: 0, played: 0 }
    : { ...snap.data(), name, pictureUrl: pictureUrl || '' };

  return { success: true, isNew, player: data };
}

/**
 * Record win/lose result using a batch write
 * - adds score document
 * - atomically increments player totals
 */
async function dbRecordResult(playerId, result, points){
  const batch     = db.batch();
  const scoreRef  = db.collection('scores').doc();
  const playerRef = db.collection('players').doc(playerId);
  const inc       = firebase.firestore.FieldValue.increment;

  batch.set(scoreRef, {
    playerId,
    result,
    points,
    createdAt: new Date(),
  });

  batch.update(playerRef, {
    totalPoints: inc(points),
    played:      inc(1),
    [result === 'win' ? 'wins' : 'losses']: inc(1),
  });

  await batch.commit();
  return { success: true };
}

/**
 * Load all data needed for the 3 views in parallel:
 *   - players (for all-time rankings) — already aggregated in player docs
 *   - today's scores  (for daily view)
 *   - this year's scores (for monthly view + winners grid)
 */
async function dbGetAllData(){
  const now        = new Date();
  const dayStart   = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yearStart  = new Date(now.getFullYear(), 0, 1);
  const curMonth   = now.getMonth(); // 0-11

  const [playersSnap, dailySnap, yearSnap] = await Promise.all([
    db.collection('players').orderBy('totalPoints','desc').get(),
    db.collection('scores').where('createdAt','>=',dayStart).get(),
    db.collection('scores').where('createdAt','>=',yearStart).get(),
  ]);

  // Player map  {lineUserId → player data}
  const players   = playersSnap.docs.map(d => d.data());
  const playerMap = {};
  players.forEach(p => { playerMap[p.id] = p; });

  // ── All-time rankings (from pre-aggregated player docs) ──
  const rankings = players
    .filter(p => (p.totalPoints || 0) > 0)
    .map(p => ({
      ...p,
      points:  p.totalPoints || 0,
      played:  p.played  || 0,
      wins:    p.wins    || 0,
      losses:  p.losses  || 0,
    }));

  // ── Daily rankings ──
  const dailyAgg = {};
  dailySnap.docs.forEach(d => {
    const s = d.data();
    if(!dailyAgg[s.playerId]) dailyAgg[s.playerId] = { points:0, wins:0, losses:0, played:0 };
    dailyAgg[s.playerId].points += s.points;
    dailyAgg[s.playerId].played++;
    if(s.result === 'win') dailyAgg[s.playerId].wins++;
    else                   dailyAgg[s.playerId].losses++;
  });
  const daily = Object.entries(dailyAgg)
    .map(([id, stats]) => ({ ...(playerMap[id] || { id, name: id, pictureUrl:'' }), ...stats }))
    .sort((a,b) => b.points - a.points || b.wins - a.wins);

  // ── Monthly rankings + yearly winners (single pass over year scores) ──
  const monthAgg  = {};
  const yearlyAgg = {}; // month(0-11) → { playerId: totalPoints }

  yearSnap.docs.forEach(d => {
    const s  = d.data();
    const mo = tsToDate(s.createdAt).getMonth(); // 0-11

    // Current month aggregate
    if(mo === curMonth){
      if(!monthAgg[s.playerId]) monthAgg[s.playerId] = { points:0, wins:0, losses:0, played:0 };
      monthAgg[s.playerId].points += s.points;
      monthAgg[s.playerId].played++;
      if(s.result === 'win') monthAgg[s.playerId].wins++;
      else                   monthAgg[s.playerId].losses++;
    }

    // Yearly winners aggregate
    if(!yearlyAgg[mo]) yearlyAgg[mo] = {};
    yearlyAgg[mo][s.playerId] = (yearlyAgg[mo][s.playerId] || 0) + s.points;
  });

  const monthly = Object.entries(monthAgg)
    .map(([id, stats]) => ({ ...(playerMap[id] || { id, name: id, pictureUrl:'' }), ...stats }))
    .sort((a,b) => b.points - a.points || b.wins - a.wins);

  const winners = Array.from({ length:12 }, (_, i) => {
    const map = yearlyAgg[i];
    if(!map || !Object.keys(map).length) return { month: i };
    const [winnerId, pts] = Object.entries(map).sort((a,b) => b[1]-a[1])[0];
    const player = playerMap[winnerId];
    return { month: i, winner: player ? { ...player, points: pts } : null };
  });

  return { players, rankings, daily, monthly, winners };
}

// =================================================================
// LIFF LOGIN
// =================================================================

async function loginWithLIFF(resultParam){
  if(localStorage.getItem('shuttle_logout') && !resultParam){
    localStorage.removeItem('shuttle_logout');
    showLogin(); hideSplash(); return;
  }
  localStorage.removeItem('shuttle_logout');

  const isQRScan = resultParam === 'win' || resultParam === 'lose';
  const cached   = localStorage.getItem('shuttle_player');

  // ── Normal open (no QR scan) ──
  if(!isQRScan){
    if(cached){ currentUser = JSON.parse(cached); showApp(); hideSplash(); loadCachedData(); }
    _backgroundRefresh().catch(console.error);
    return;
  }

  // ── QR scan ──
  if(cached){
    // Known user → record immediately, refresh in background
    currentUser = JSON.parse(cached);
    showApp(); hideSplash();
    window.history.replaceState({}, '', window.location.pathname);
    await processResult(resultParam);
    _backgroundRefresh().catch(console.error);
    return;
  }

  // New user → register first
  try{
    const profile = await liff.getProfile();
    const reg     = await dbRegisterPlayer(profile.userId, profile.displayName, profile.pictureUrl || '');
    if(!reg.success){ toast('เกิดข้อผิดพลาด ลองใหม่'); return; }
    currentUser = reg.player;
    localStorage.setItem('shuttle_player', JSON.stringify(currentUser));
    showApp(); hideSplash();
    if(reg.isNew) toast('ยินดีต้อนรับ! 🏸');
    window.history.replaceState({}, '', window.location.pathname);
    await processResult(resultParam);
  }catch(err){
    console.error('LIFF login error', err);
    showLogin(); hideSplash();
  }
}

// Background refresh: update profile + reload data without blocking UI
async function _backgroundRefresh(){
  try{
    if(!liff.isLoggedIn()) return;
    const profile = await liff.getProfile();
    const reg     = await dbRegisterPlayer(profile.userId, profile.displayName, profile.pictureUrl || '');
    if(reg?.success){
      currentUser = reg.player;
      localStorage.setItem('shuttle_player', JSON.stringify(currentUser));
      const n = $('#display-name'); if(n) n.textContent = currentUser.name;
      const p = $('#display-pic');
      if(p && currentUser.pictureUrl){ p.src = currentUser.pictureUrl; p.style.display='block'; }
    }
    await loadAllData();
  }catch(e){ console.error('background refresh', e); }
}

function logout(){
  localStorage.removeItem('shuttle_player');
  localStorage.setItem('shuttle_logout','1');
  currentUser = null;
  try{ liff.logout(); }catch(e){}
  window.location.reload();
}

// =================================================================
// UI
// =================================================================
function showLogin(){

  $('#app-main').style.display   = 'none';
}

function showApp(){
  $('#view-login').style.display = 'none';
  $('#app-main').style.display   = 'block';

  const pic = $('#display-pic');

function hideSplash(){

  if(!s) return;
  s.classList.add('hide');
  setTimeout(() => s.parentNode && s.remove(), 500);
}

// =================================================================
// DATA LOADING
// =================================================================

function renderAll(){ renderDaily(); renderMonthly(); renderRanks(); }

function loadCachedData(){
  try{
    const c = localStorage.getItem('shuttle_data');
    if(!c) return false;
    const d = JSON.parse(c);
    allRankings        = d.rankings || [];
    allDailyRankings   = d.daily    || [];
    allMonthlyRankings = d.monthly  || [];
    allMonthlyWinners  = d.winners  || [];
    renderAll(); return true;
  }catch(e){ return false; }
}

async function loadAllData(){
  try{
    const res = await dbGetAllData();
    allRankings        = res.rankings || [];
    allDailyRankings   = res.daily    || [];
    allMonthlyRankings = res.monthly  || [];
    allMonthlyWinners  = res.winners  || [];
    localStorage.setItem('shuttle_data', JSON.stringify({
      rankings: allRankings, daily: allDailyRankings,
      monthly: allMonthlyRankings, winners: allMonthlyWinners,
    }));
    renderAll();
  }catch(err){
    console.error('Data load error', err);
    toast('โหลดข้อมูลไม่สำเร็จ');
  }

// =================================================================
// RENDER helpers
// =================================================================
const THAI_MONTHS_SHORT = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const THAI_MONTHS_FULL  = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

/* --- Tie-aware ranking: standard competition ranking (1,1,3,4...) ---
   Same points + same wins → same rank number
   Same points but more wins → better rank */
function withRanks(list){
  const out = [];
  for(let i = 0; i < list.length; i++){
    if(i === 0){
      out.push({ ...list[i], _rank: 1 });
    } else {
      const prev = out[i-1];
      const tied = list[i].points === prev.points && (list[i].wins||0) === (prev.wins||0);
      out.push({ ...list[i], _rank: tied ? prev._rank : i + 1 });
    }
  }
  return out;
}

function rankRowHtml(r){
  const rank    = r._rank;
  const podium  = rank === 1 ? 'p1' : rank === 2 ? 'p2' : rank === 3 ? 'p3' : '';
  const medal   = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';
  const posHtml = medal
    ? `<span style="font-size:22px">${medal}</span>`
    : `<span class="pos-num">${rank}</span>`;
  const picHtml = r.pictureUrl ? `<img src="${escHtml(r.pictureUrl)}" alt="" />` : '';
  const wins    = r.wins   || 0;
  const losses  = r.losses || 0;
  const played  = r.played || 0;
  const wr      = played > 0 ? Math.round(wins / played * 100) : 0;
  return `<div class="rank-row ${podium}">
    <div class="pos">${posHtml}</div>
    <div class="info">
      <span class="n">${picHtml}${escHtml(r.name)}</span>
      <div class="stat-badges">
        <span class="badge-w">W ${wins}</span>
        <span class="badge-l">L ${losses}</span>
        <div class="wr-wrap">
          <div class="wr-bar"><div class="wr-fill" style="width:${wr}%"></div></div>
          <span class="wr-txt">${wr}%</span>
        </div>
      </div>
    </div>
    <div class="pts">${r.points}<small>pts</small></div>
  </div>`;
}

function renderDaily(){
  const now = new Date();
  const el = $('#daily-date');
  if(el) el.textContent = now.toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const c = $('#daily-list');
  if(!c) return;
  c.innerHTML = allDailyRankings.length === 0
    ? '<div class="empty">ยังไม่มีเกมวันนี้<br><small style="font-size:13px;font-family:\'DM Sans\',sans-serif;font-style:normal">สแกน QR ที่สนามเพื่อเริ่มบันทึก</small></div>'
    : withRanks(allDailyRankings).map(rankRowHtml).join('');
}

function renderMonthly(){
  const now = new Date();
  const el = $('#monthly-label');
  if(el) el.textContent = `${THAI_MONTHS_FULL[now.getMonth()]} ${now.getFullYear()}`;
  const c = $('#monthly-list');
  if(c){
    c.innerHTML = allMonthlyRankings.length === 0
      ? '<div class="empty">ยังไม่มีเกมเดือนนี้</div>'
      : withRanks(allMonthlyRankings).map(rankRowHtml).join('');
  }
  renderMonthlyWinners();
}

function renderMonthlyWinners(){
  const grid = $('#monthly-winners-grid');
  if(!grid) return;
  if(!allMonthlyWinners || !allMonthlyWinners.length){
    grid.innerHTML = '<div class="empty">ยังไม่มีข้อมูล</div>'; return;
  }
  const curMonth = new Date().getMonth(); // 0-11
  grid.innerHTML = '<div class="winners-grid">' + allMonthlyWinners.map(w => {
    const isCur = w.month === curMonth;
    const mo    = THAI_MONTHS_SHORT[w.month];
    if(!w.winner){
      return `<div class="winner-card empty-slot${isCur?' cur-month':''}">
        <div class="mo">${mo}</div>
        <div class="no-pic"></div>
        <div class="wname" style="color:var(--line)">—</div>
      </div>`;
    }
    const pic = w.winner.pictureUrl
      ? `<img src="${escHtml(w.winner.pictureUrl)}" alt="${escHtml(w.winner.name)}" />`
      : `<div class="no-pic">👤</div>`;
    return `<div class="winner-card has-winner${isCur?' cur-month':''}">
      <div class="mo">${mo}</div>
      ${pic}
      <div class="wname">${escHtml(w.winner.name)}</div>
      <div class="wpts">${w.winner.points} pts</div>
    </div>`;
  }).join('') + '</div>';
}

function renderRanks(){
  const c = $('#rank-list');
  if(!c) return;
  c.innerHTML = allRankings.length === 0
    ? '<div class="empty">ยังไม่มีข้อมูลคะแนน<br>สแกน QR ที่สนามเพื่อเริ่มเล่น!</div>'
    : withRanks(allRankings).map(rankRowHtml).join('');
}

// =================================================================
// OPTIMISTIC UPDATE — อัปเดต UI ทันที ไม่รอ Firestore (Facebook Like pattern)
// =================================================================
function applyOptimisticUpdate(playerId, result, pts){
  // helper: เพิ่มคะแนนใน ranking list ทันที แล้ว re-sort
  function updateList(list){
    const idx = list.findIndex(r => r.id === playerId);
    if(idx !== -1){
      list[idx] = {
        ...list[idx],
        points:  (list[idx].points  || 0) + pts,
        played:  (list[idx].played  || 0) + 1,
        wins:    (list[idx].wins    || 0) + (result === 'win'  ? 1 : 0),
        losses:  (list[idx].losses  || 0) + (result === 'lose' ? 1 : 0),
      };
    } else {
      // player ยังไม่มีในวันนี้/เดือนนี้ → เพิ่มใหม่
      list.push({
        ...currentUser,
        points: pts, played: 1,
        wins:   result === 'win'  ? 1 : 0,
        losses: result === 'lose' ? 1 : 0,
      });
    }
    list.sort((a, b) => b.points - a.points || b.wins - a.wins);
  }

  updateList(allDailyRankings);
  updateList(allMonthlyRankings);
  updateList(allRankings);
  renderAll(); // แสดงผลทันที
}

// =================================================================
// RECORD RESULT — Optimistic first, Firestore sync ใน background
// =================================================================
async function processResult(result){
  if(!currentUser){ return; }
  if(_resultHandled){ console.warn('processResult already handled'); return; }
  _resultHandled = true;

  const pts = result === 'win' ? 3 : 1;

  // ① แสดงผลทันทีเลย — ไม่รอ network
  switchTab('daily');
  applyOptimisticUpdate(currentUser.id, result, pts);
  toast(result === 'win' ? '🏆 ชนะ! +3 คะแนน' : '✅ แพ้ +1 คะแนน');

  // ② Firestore write + sync ใน background — user ไม่ต้องรอ
  try{
    await dbRecordResult(currentUser.id, result, pts);
    await loadAllData(); // sync ข้อมูลจริงจาก server (อาจมีคนอื่น scan ด้วย)
  }catch(err){
    console.error('recordResult error', err);
    _resultHandled = false; // allow retry
    loadCachedData();       // rollback UI กลับ state เดิม
    toast('บันทึกไม่สำเร็จ กรุณาสแกนใหม่');
  }
}

// =================================================================
// TAB NAVIGATION
// =================================================================
function switchTab(viewName){
  $$('.tab').forEach(t => t.setAttribute('aria-selected', t.dataset.view === viewName ? 'true':'false'));
  $$('.view').forEach(s => s.classList.remove('active'));
  const target = $(`#view-${viewName}`);
  if(target) target.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

// =================================================================
// EVENTS
// =================================================================
function wireEvents(){
  $('#btn-line-login').addEventListener('click', () => liff.login({ redirectUri: window.location.href }));
  $('#btn-logout').addEventListener('click', logout);
  $$('.tab').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.view)));
}

// =================================================================
// URL HELPERS — extract result=win/lose through all LIFF encodings
// Handles: ?result=win  |  liff.state=?result=win
//          liff.state=/result=win  |  liff.state=/?result=win
// =================================================================
function extractResult(search){
  const direct = new URLSearchParams(search).get('result');
  if(direct === 'win' || direct === 'lose') return direct;

  const liffState = new URLSearchParams(search).get('liff.state');
  if(!liffState) return null;

  try{
    const decoded = decodeURIComponent(liffState);
    const qIdx = decoded.indexOf('?');
    const qs   = qIdx !== -1 ? decoded.slice(qIdx+1) : decoded.replace(/^[/?]+/,'');
    const r    = new URLSearchParams(qs).get('result');
    if(r === 'win' || r === 'lose') return r;
  }catch(e){}

  return null;
}

// =================================================================
// BOOT
// =================================================================
async function boot(){
  _resultHandled = false;
  wireEvents();

  // Capture result param BEFORE liff.init can redirect
  const preSearch = window.location.search;
  const preResult = extractResult(preSearch);
  if(preResult) localStorage.setItem('shuttle_pending_result', preResult);

  const cachedPlayer = localStorage.getItem('shuttle_player');
  const isLogout     = localStorage.getItem('shuttle_logout');

  // Fast path: show cache immediately
  if(cachedPlayer && !isLogout){
    currentUser = JSON.parse(cachedPlayer);
    showApp(); hideSplash();
    if(preResult === 'win' || preResult === 'lose'){
      switchTab('daily');
      loadCachedData();
      $('#daily-list').innerHTML = '<div class="empty loading">กำลังบันทึก...</div>';
    } else {
      loadCachedData();
    }
  }

  // Init LIFF
  try{
    await liff.init({ liffId: LIFF_ID });
  }catch(err){
    console.error('LIFF init failed', err);
    if(!currentUser){ showLogin(); hideSplash(); }
    return;
  }

  // Resolve result from all sources
  const resultParam =
    extractResult(window.location.search) ||
    preResult ||
    localStorage.getItem('shuttle_pending_result');
  localStorage.removeItem('shuttle_pending_result');

  if(!liff.isLoggedIn()){
    if(resultParam === 'win' || resultParam === 'lose'){
      localStorage.setItem('shuttle_pending_result', resultParam);
      liff.login({ redirectUri: window.location.href });
      return;
    }
    currentUser = null;
    localStorage.removeItem('shuttle_player');
    showLogin(); hideSplash(); return;
  }

  await loginWithLIFF(resultParam);
}

document.addEventListener('DOMContentLoaded', boot);
</script>
