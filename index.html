<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ก๊วนอยากตีแบด</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
/* =================================================================
   DESIGN SYSTEM
   Sporty-editorial: dark ground, neon accent, confident type
   ================================================================= */
:root {
  --bg:       #0e0f11;
  --bg-card:  #181a1e;
  --bg-input: #1f2228;
  --ink:      #e8e6e1;
  --ink-soft: #9b9a95;
  --ink-mute: #5c5b57;
  --line:     #2a2c31;
  --accent:   #c6f135;
  --accent-dim:#c6f13530;
  --danger:   #f14e4e;
  --gold:     #ffd644;
  --silver:   #b8c0cc;
  --bronze:   #d4915e;
  --radius:   16px;
  --radius-sm:12px;
  --shadow:   0 2px 20px -8px #000a;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background: var(--bg);
  color: var(--ink);
  font-family:'DM Sans', system-ui, sans-serif;
  font-size:16px;
  line-height:1.45;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
}

/* ---- App shell ---- */
.app{max-width:480px;margin:0 auto;padding:0 16px 120px;position:relative}

/* ---- Loading / splash ---- */
#splash{
  position:fixed;inset:0;z-index:200;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;
  transition:opacity .4s ease;
}
#splash.hide{opacity:0;pointer-events:none}
#splash .logo{font-family:'Instrument Serif',serif;font-size:48px;letter-spacing:-.03em}
#splash .dot{display:inline-block;width:10px;height:10px;background:var(--accent);border-radius:50%;margin:0 1px 6px 2px}
#splash .sub{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft)}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
#splash .loading{animation:pulse 1.2s ease infinite}

/* ---- Header ---- */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 0 14px;
  border-bottom:1px solid var(--line);
  margin-bottom:6px;
}
.header .brand{
  font-family:'Instrument Serif',serif;
  font-size:28px;letter-spacing:-.02em;
  display:flex;align-items:center;gap:1px;
}
.header .brand .dot{display:inline-block;width:7px;height:7px;background:var(--accent);border-radius:50%;margin:0 1px 4px 1px}
.header .user-info{display:flex;align-items:center;gap:10px}
.header .user-info img{width:34px;height:34px;border-radius:50%;border:2px solid var(--accent);object-fit:cover}
.header .user-info .uname{font-size:13px;font-weight:600;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header .logout{
  background:none;border:1px solid var(--line);color:var(--ink-mute);
  font-size:11px;padding:6px 10px;border-radius:8px;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;letter-spacing:.08em;text-transform:uppercase;
}

/* ---- Tab bar ---- */
.tabs{
  position:sticky;top:0;z-index:20;
  background:var(--bg);
  border-bottom:1px solid var(--line);
  display:grid;grid-template-columns:repeat(4,1fr);
  margin:0 -16px;padding:0 4px;
}
.tab{
  appearance:none;border:0;background:transparent;
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-mute);padding:14px 2px 12px;cursor:pointer;
  position:relative;transition:color .2s;
}
.tab[aria-selected="true"]{color:var(--accent)}
.tab[aria-selected="true"]::after{
  content:'';position:absolute;left:16%;right:16%;bottom:-1px;
  height:3px;background:var(--accent);border-radius:2px 2px 0 0;
}

/* ---- Views ---- */
section.view{display:none;animation:fadeUp .25s ease}
section.view.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.section-title{
  font-family:'Instrument Serif',serif;font-size:32px;
  letter-spacing:-.02em;margin:20px 0 16px;line-height:1.1;
}
.section-title em{font-style:italic;color:var(--ink-soft)}

/* ---- Cards ---- */
.card{
  background:var(--bg-card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px;
  box-shadow:var(--shadow);
}
.card+.card{margin-top:12px}

/* ---- Form elements ---- */
label.field{
  display:block;
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-soft);margin-bottom:8px;
}
select{
  width:100%;background:var(--bg-input);
  border:1.5px solid var(--line);border-radius:var(--radius-sm);
  padding:14px;font:inherit;font-size:16px;color:var(--ink);
  outline:none;-webkit-appearance:none;appearance:none;
  background-image:
    linear-gradient(45deg,transparent 50%,var(--ink-soft) 50%),
    linear-gradient(135deg,var(--ink-soft) 50%,transparent 50%);
  background-position:calc(100% - 18px) 50%,calc(100% - 13px) 50%;
  background-size:5px 5px,5px 5px;background-repeat:no-repeat;
  padding-right:36px;transition:border-color .15s,box-shadow .15s;
}
select:focus{box-shadow:0 0 0 3px var(--accent-dim);border-color:var(--accent)}
select option{background:var(--bg-card);color:var(--ink)}

/* ---- Buttons ---- */
.btn{
  appearance:none;border:1.5px solid var(--line);
  background:var(--bg-input);color:var(--ink);
  font-family:inherit;font-weight:600;font-size:16px;
  padding:16px 18px;width:100%;border-radius:var(--radius-sm);
  cursor:pointer;transition:transform .06s,background .15s;
  min-height:54px;
}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--accent);color:#111;border-color:var(--accent)}
.btn.primary:disabled{opacity:.35;cursor:not-allowed}
.btn.line-btn{
  background:#06c755;color:#fff;border-color:#06c755;
  font-size:17px;display:flex;align-items:center;justify-content:center;gap:10px;
  min-height:58px;border-radius:var(--radius);
}
.btn.line-btn svg{flex-shrink:0}

/* ---- Winner toggle ---- */
.winner-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.winner-row button{
  appearance:none;border:1.5px solid var(--line);
  background:var(--bg-input);color:var(--ink);
  padding:16px 10px;border-radius:var(--radius-sm);
  font:inherit;font-weight:600;cursor:pointer;font-size:15px;min-height:54px;
  transition:background .15s,border-color .15s,color .15s;
}
.winner-row button[aria-pressed="true"]{
  background:var(--accent);color:#111;border-color:var(--accent);
}

/* ---- Ranking rows ---- */
.rank-list{display:flex;flex-direction:column;gap:8px}
.rank-row{
  display:grid;grid-template-columns:38px 1fr auto;align-items:center;gap:12px;
  background:var(--bg-card);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:14px 16px;
  position:relative;overflow:hidden;
}
.rank-row .pos{
  font-family:'Instrument Serif',serif;font-weight:400;
  font-size:24px;text-align:center;color:var(--ink-soft);
}
.rank-row .info{min-width:0;display:flex;flex-direction:column;gap:2px}
.rank-row .info .n{
  font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.rank-row .info .n img{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0}
.rank-row .info .stats{
  font-family:'IBM Plex Mono',monospace;font-size:10.5px;
  letter-spacing:.08em;color:var(--ink-mute);text-transform:uppercase;
}
.rank-row .pts{
  font-family:'Instrument Serif',serif;font-size:28px;text-align:right;
}
.rank-row .pts small{
  font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--ink-mute);display:block;margin-top:-4px;
}

/* Podium highlights */
.rank-row.p1{background:linear-gradient(105deg,var(--bg-card) 50%,#c6f13520 100%);border-color:var(--accent)}
.rank-row.p1 .pos{color:var(--accent)}
.rank-row.p2{border-color:var(--silver)}
.rank-row.p2 .pos{color:var(--silver)}
.rank-row.p3{border-color:var(--bronze)}
.rank-row.p3 .pos{color:var(--bronze)}

/* ---- Match history cards ---- */
.match-card{
  background:var(--bg-card);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:14px;
}
.match-card+.match-card{margin-top:10px}
.match-card .when{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:.12em;text-transform:uppercase;color:var(--ink-mute);
  margin-bottom:10px;display:flex;justify-content:space-between;
}
.match-card .sides{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
.match-card .side{
  padding:10px;border-radius:10px;
  background:var(--bg-input);border:1px dashed transparent;
}
.match-card .side.win{background:var(--accent-dim);border-color:var(--accent)}
.match-card .side .lbl{
  font-family:'IBM Plex Mono',monospace;font-size:9.5px;
  letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);
  margin-bottom:4px;
}
.match-card .side.win .lbl{color:var(--accent)}
.match-card .side .names{font-weight:600;font-size:14px;line-height:1.35}
.match-card .mid{
  font-family:'Instrument Serif',serif;font-style:italic;
  color:var(--ink-mute);font-size:14px;text-align:center;
}

/* ---- Login screen ---- */
#view-login{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:70dvh;gap:24px;text-align:center;
}
#view-login .hero{
  font-family:'Instrument Serif',serif;font-size:56px;
  letter-spacing:-.03em;line-height:.95;
}
#view-login .hero .dot{display:inline-block;width:12px;height:12px;background:var(--accent);border-radius:50%;margin:0 1px 8px 2px}
#view-login .tagline{color:var(--ink-soft);font-size:15px;max-width:260px;margin:0 auto}
#view-login .login-wrap{width:100%;max-width:320px}

/* ---- Toast ---- */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(40px);
  background:var(--accent);color:#111;
  padding:12px 20px;border-radius:100px;
  font-family:'IBM Plex Mono',monospace;font-size:12px;
  letter-spacing:.1em;text-transform:uppercase;font-weight:600;
  opacity:0;transition:transform .3s cubic-bezier(.2,.9,.3,1.3),opacity .3s;
  z-index:50;pointer-events:none;box-shadow:0 10px 30px -10px #000a;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}


/* ---- Empty state ---- */
.empty{
  text-align:center;padding:40px 20px;
  color:var(--ink-mute);font-style:italic;
  font-family:'Instrument Serif',serif;font-size:16px;
}

/* ---- Utility ---- */
.mt{margin-top:14px}
.mb{margin-bottom:14px}
.gap-sm{gap:8px}
.text-mute{color:var(--ink-mute)}
.text-sm{font-size:13px}
.text-center{text-align:center}

/* ---- Result buttons ---- */
.result-grid{display:grid;gap:14px;margin-top:8px}
.btn-result{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px 20px;border-radius:var(--radius);border:2px solid;
  cursor:pointer;background:none;width:100%;min-height:130px;
  transition:transform .08s,opacity .15s;
}
.btn-result:active{transform:scale(.97)}
.btn-result.win{border-color:var(--accent);background:var(--accent-dim)}
.btn-result.lose{border-color:var(--line);background:var(--bg-card)}
.btn-result .r-pts{
  font-family:'Instrument Serif',serif;font-size:52px;line-height:1;
  color:var(--accent);
}
.btn-result.lose .r-pts{color:var(--ink-soft)}
.btn-result .r-label{
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;margin-top:8px;
  color:var(--accent);
}
.btn-result.lose .r-label{color:var(--ink-mute)}
.btn-result.loading{opacity:.5;pointer-events:none}

/* Small screens */
@media(max-width:360px){
  .match-card .sides{grid-template-columns:1fr}
  .match-card .mid{padding:4px 0}
}
</style>
</head>
<body>

<!-- ================================================================
     SPLASH SCREEN
     ================================================================ -->
<div id="splash">
  <div class="logo">ก๊วนอยากตีแบด</div>
  <div class="sub loading">กำลังโหลด...</div>
</div>

<main class="app">

  <!-- ================================================================
       LOGIN SCREEN (shown when not authenticated)
       ================================================================ -->
  <section id="view-login" class="view">
    <div class="hero">ก๊วนอยากตีแบด</div>
    <p class="tagline">สแกน QR ที่สนาม → เข้าสู่ระบบด้วย LINE → เก็บคะแนนแบดมินตัน</p>
    <div class="login-wrap">
      <button class="btn line-btn" id="btn-line-login">
        <!-- LINE icon -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 5.83 2 10.43c0 4.18 3.7 7.68 8.7 8.34.34.07.8.22.91.51.1.26.07.67.03.93l-.15.88c-.04.26-.2 1.02.9.56 1.09-.47 5.89-3.47 8.04-5.94C22.19 13.74 22 12.14 22 10.43 22 5.83 17.52 2 12 2z" fill="#fff"/></svg>
        เข้าสู่ระบบด้วย LINE
      </button>
    </div>
  </section>

  <!-- ================================================================
       MAIN APP (shown after login)
       ================================================================ -->
  <div id="app-main" style="display:none">

    <header class="header">
      <div class="brand">ก๊วนอยากตีแบด</div>
      <div class="user-info">
        <span class="uname" id="display-name">—</span>
        <img id="display-pic" src="" alt="profile" />
        <button class="logout" id="btn-logout">ออก</button>
      </div>
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab" role="tab" aria-selected="true"  data-view="weekly">อาทิตย์นี้</button>
      <button class="tab" role="tab" aria-selected="false" data-view="ranks">ตลอดกาล</button>
      <button class="tab" role="tab" aria-selected="false" data-view="winrate">% ชนะ</button>
      <button class="tab" role="tab" aria-selected="false" data-view="record">บันทึก</button>
    </nav>

    <!-- ---- VIEW: WEEKLY ---- -->
    <section class="view active" id="view-weekly">
      <h2 class="section-title">อาทิตย์<em>นี้</em></h2>
      <p class="text-mute text-sm" style="margin:-8px 0 16px">จันทร์ – อาทิตย์ · reset ทุกวันจันทร์</p>
      <div class="rank-list" id="weekly-list"></div>
    </section>

    <!-- ---- VIEW: ALL-TIME RANKINGS ---- -->
    <section class="view" id="view-ranks">
      <h2 class="section-title">อันดับ<em>ตลอดกาล</em></h2>
      <div class="rank-list" id="rank-list"></div>
    </section>

    <!-- ---- VIEW: WIN RATE ---- -->
    <section class="view" id="view-winrate">
      <h2 class="section-title">% ชนะ<em>ตลอดกาล</em></h2>
      <div class="rank-list" id="winrate-list"></div>
    </section>

    <!-- ---- VIEW: RECORD ---- -->
    <section class="view" id="view-record">
      <h2 class="section-title">บันทึก<em>ผล</em></h2>
      <p class="text-mute text-sm" style="margin-bottom:24px">สแกน QR Code ที่สนาม แล้วกดปุ่มด้านล่าง</p>
      <button class="btn primary" id="btn-scan-qr" style="width:100%;padding:18px;font-size:1.1rem">
        📷 สแกน QR บันทึกผล
      </button>
      <div style="display:none">
        <button class="btn-result win" id="btn-win">
          <span class="r-pts">+3</span>
          <span class="r-label">ชนะ</span>
        </button>
        <button class="btn-result lose" id="btn-lose">
          <span class="r-pts">+1</span>
          <span class="r-label">แพ้</span>
        </button>
      </div>
    </section>

  </div><!-- /app-main -->

  <p style="text-align:center;color:#5c5b57;font-size:11px;padding:24px 0 8px;font-family:'IBM Plex Mono',monospace">v1.6</p>

</main>

<div class="toast" id="toast"></div>

<!-- Recording overlay -->
<div id="recording-overlay" style="display:none;position:fixed;inset:0;background:#0e0f11ee;z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div id="recording-icon" style="font-size:64px">⏳</div>
  <div id="recording-msg" style="font-size:1.2rem;font-weight:700;color:#e8e6e1;text-align:center"></div>
</div>

<script>
/* =================================================================
   SHUTTLE — BADMINTON TRACKER
   Frontend with LINE Login + Google Sheets API backend
   ================================================================= */

// =================================================================
// ⚙️ CONFIG
// =================================================================
const LIFF_ID  = '2009832825-of9TI64X';
const API_BASE = 'https://script.google.com/macros/s/AKfycbyD6wYQsxvwuuEUo0sduA-QhcBY2KI1HbjDMWizf9_Q_GFFWKEo4t800ymRvBl6J6E_YA/exec';

// =================================================================
// STATE
// =================================================================
let currentUser        = null;
let allPlayers         = [];
let allRankings        = [];
let allWeeklyRankings  = [];
let _resultHandled     = false; // guard: processResult เรียกได้ครั้งเดียวต่อ session

// =================================================================
// DOM helpers
// =================================================================
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => [...document.querySelectorAll(sel)];
function escHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function toast(msg){
  const el=$('#toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove('show'),2000);
}

// =================================================================
// API calls (Google Apps Script)
// =================================================================
async function api(action, params={}){
  const url = new URL(API_BASE);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v])=> url.searchParams.set(k,v));
  const res = await fetch(url.toString());
  return res.json();
}

async function apiPost(body){
  // Google Apps Script Web App requires redirect-following for POST
  const res = await fetch(API_BASE, {
    method: 'POST',
    headers: {'Content-Type':'text/plain'},  // GAS quirk: use text/plain to avoid preflight
    body: JSON.stringify(body),
    redirect: 'follow',
  });
  return res.json();
}

// =================================================================
// LIFF LOGIN
// =================================================================

async function loginWithLIFF(resultParam){
  if(localStorage.getItem('shuttle_logout') && !resultParam){
    localStorage.removeItem('shuttle_logout');
    showLogin(); hideSplash(); return;
  }
  localStorage.removeItem('shuttle_logout');

  const isQRScan = resultParam === 'win' || resultParam === 'lose';
  const cached   = localStorage.getItem('shuttle_player');

  // ══ เปิด app ปกติ (ไม่ใช่ QR scan) ══
  // แสดงจาก cache ทันที แล้ว refresh background
  if(!isQRScan){
    if(cached){
      currentUser = JSON.parse(cached);
      showApp(); hideSplash();
      loadCachedData();
    }
    _backgroundRefresh().catch(console.error);
    return;
  }

  // ══ QR scan: verify user ก่อน แล้วค่อย record ══
  // processResult ถูกเรียกจากที่นี่ที่เดียว — ไม่มีทางเรียกซ้ำ
  try{
    const profile   = await liff.getProfile();
    const regResult = await apiPost({
      action:     'registerPlayer',
      name:       profile.displayName,
      lineUserId: profile.userId,
      pictureUrl: profile.pictureUrl || '',
    });

    if(!regResult.success){
      hideRecording();
      toast(regResult.error || 'เกิดข้อผิดพลาด');
      return;
    }

    currentUser = regResult.player;
    localStorage.setItem('shuttle_player', JSON.stringify(currentUser));

    if(!cached){
      showApp(); hideSplash();
      if(regResult.isNew) toast('ยินดีต้อนรับ! 🏸');
    }

    window.history.replaceState({}, '', window.location.pathname);
    await processResult(resultParam);

  }catch(err){
    console.error('LIFF login error', err);
    hideRecording();
    if(!cached){ showLogin(); hideSplash(); }
  }
}

// background refresh user info + data (non-blocking)
async function _backgroundRefresh(){
  try{
    const profile   = await liff.getProfile();
    const regResult = await apiPost({
      action:     'registerPlayer',
      name:       profile.displayName,
      lineUserId: profile.userId,
      pictureUrl: profile.pictureUrl || '',
    });
    if(regResult?.success){
      currentUser = regResult.player;
      localStorage.setItem('shuttle_player', JSON.stringify(currentUser));
      const n = $('#display-name'); if(n) n.textContent = currentUser.name;
      const p = $('#display-pic');  if(p && currentUser.pictureUrl) p.src = currentUser.pictureUrl;
    }
    await loadAllData();
  }catch(e){ console.error('background refresh', e); }
}

function logout(){
  localStorage.removeItem('shuttle_player');
  localStorage.setItem('shuttle_logout', '1');
  currentUser = null;
  try{ liff.logout(); }catch(e){}
  window.location.reload();
}

// =================================================================
// UI — Show/hide screens
// =================================================================
function showLogin(){
  $('#view-login').style.display = 'flex';
  $('#app-main').style.display = 'none';
}

function showApp(){
  $('#view-login').style.display = 'none';
  $('#app-main').style.display = 'block';
  setupRecordTab();

  // Display user info
  $('#display-name').textContent = currentUser.name;

  }

}

function hideSplash(){
  const s = $('#splash');
  if(!s) return; // ป้องกัน call ซ้ำ
  s.classList.add('hide');
  setTimeout(()=> s.parentNode && s.remove(), 500);
}

// =================================================================
// DATA LOADING
// =================================================================

// โหลด cache จาก localStorage → แสดงทันที ไม่รอ network
function loadCachedData(){
  try{
    const c = localStorage.getItem('shuttle_data');
    if(!c) return false;
    const { players, rankings, weekly } = JSON.parse(c);
    allPlayers        = players  || [];
    allRankings       = rankings || [];
    allWeeklyRankings = weekly   || [];
    renderRanks(); renderWeekly(); renderWinRate();
    return true;
  }catch(e){ return false; }
}

async function loadAllData(){
  try{
    // 1 call แทน 3 — เร็วกว่าเดิม 3x
    const res = await api('getAllData');

    allPlayers        = res.players  || [];
    allRankings       = res.rankings || [];
    allWeeklyRankings = res.weekly   || [];

    // บันทึก cache ไว้สำหรับครั้งหน้า
    localStorage.setItem('shuttle_data', JSON.stringify({
      players: allPlayers, rankings: allRankings, weekly: allWeeklyRankings
    }));

    renderRanks();
    renderWeekly();
    renderWinRate();
  }catch(err){
    console.error('Data load error', err);
    toast('โหลดข้อมูลไม่สำเร็จ');
  }
}

// =================================================================
// RENDER: Rankings
// =================================================================
function renderRanks(){
  const container = $('#rank-list');
  if(allRankings.length === 0){
    container.innerHTML = '<div class="empty">ยังไม่มีข้อมูลคะแนน<br>scan QR แล้วเริ่มเล่นกันเลย!</div>';
    return;
  }

  container.innerHTML = allRankings.map((r, i) => {
    const podium = i < 3 ? `p${i+1}` : '';
    const medal = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : '';
    const picHtml = r.pictureUrl
      ? `<img src="${escHtml(r.pictureUrl)}" alt="" />`
      : '';
    return `
      <div class="rank-row ${podium}">
        <div class="pos">${medal || (i+1)}</div>
        <div class="info">
          <span class="n">${picHtml}${escHtml(r.name)}</span>
          <span class="stats">${r.played} เกม · ${r.wins} ชนะ · ${r.losses} แพ้</span>
        </div>
        <div class="pts">${r.points}<small>pts</small></div>
      </div>
    `;
  }).join('');
}

// =================================================================
// RENDER: Win Rate
// =================================================================
function renderWinRate(){
  const container = $('#winrate-list');
  const ranked = [...allRankings]
    .filter(r => r.played > 0)
    .map(r => ({ ...r, pct: Math.round(r.wins / r.played * 100) }))
    .sort((a,b) => b.pct - a.pct || b.played - a.played || a.name.localeCompare(b.name));

  if(ranked.length === 0){
    container.innerHTML = '<div class="empty">ยังไม่มีข้อมูล</div>';
    return;
  }
  container.innerHTML = ranked.map((r, i) => {
    const podium  = i < 3 ? `p${i+1}` : '';
    const medal   = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : '';
    const picHtml = r.pictureUrl ? `<img src="${escHtml(r.pictureUrl)}" alt="" />` : '';
    return `
      <div class="rank-row ${podium}">
        <div class="pos">${medal || (i+1)}</div>
        <div class="info">
          <span class="n">${picHtml}${escHtml(r.name)}</span>
          <span class="stats">${r.played} เกม · ${r.wins} ชนะ · ${r.losses} แพ้</span>
        </div>
        <div class="pts">${r.pct}<small>%</small></div>
      </div>`;
  }).join('');
}

// =================================================================
// RECORD RESULT (from QR scan)
// =================================================================
function showRecording(msg, icon){
  const ov = $('#recording-overlay');
  $('#recording-icon').textContent = icon || '⏳';
  $('#recording-msg').textContent  = msg;
  ov.style.display = 'flex';
}
function hideRecording(){ $('#recording-overlay').style.display = 'none'; }

async function processResult(result){
  if(!currentUser) return;
  // Guard: ถ้าเรียกซ้ำใน session เดียวกัน → ไม่บันทึกซ้ำ
  if(_resultHandled){ console.warn('processResult already handled'); return; }
  _resultHandled = true;

  const pts = result === 'win' ? 3 : 1;

  // แสดง overlay (อาจแสดงไปแล้วจาก fast path)
  if($('#recording-overlay').style.display !== 'flex'){
    showRecording('กำลังบันทึก...', '⏳');
    switchTab('weekly');
  }

  try{
    const res = await apiPost({
      action: 'recordResult', playerId: currentUser.id, result, points: pts,
    });
    if(res.success){
      await loadAllData();
      showRecording(
        result === 'win' ? 'ชนะ! +3 pts 🏆' : 'แพ้ +1 pt ✅',
        result === 'win' ? '🏆' : '✅'
      );
      setTimeout(hideRecording, 1500);
    } else {
      hideRecording();
      toast('บันทึกไม่สำเร็จ: ' + (res.error || 'ลองใหม่'));
    }
  }catch(err){
    console.error(err);
    hideRecording();
    toast('บันทึกไม่สำเร็จ ลองใหม่');
  }
}

// =================================================================
// TAB NAVIGATION
// =================================================================
function switchTab(viewName){
  $$('.tab').forEach(t => t.setAttribute('aria-selected', t.dataset.view === viewName ? 'true':'false'));
  $$('.view').forEach(s => s.classList.remove('active'));
  const target = $(`#view-${viewName}`);
  if(target) target.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

// =================================================================
// EVENT WIRING
// =================================================================
async function recordResult(result){
  const btn = result === 'win' ? $('#btn-win') : $('#btn-lose');
  btn.classList.add('loading');
  await processResult(result);
  btn.classList.remove('loading');
}

async function openLineScanner(){
  try{
    const res = await liff.scanCodeV2();
    const url  = new URL(res.value);
    const gameResult = url.searchParams.get('result');
    if(gameResult === 'win' || gameResult === 'lose'){
      await processResult(gameResult);
    } else {
      toast('QR นี้ไม่ใช่ของก๊วน ลองใหม่');
    }
  }catch(err){
    if(err?.code !== 'CANCEL') toast('ปิดกล้องแล้ว');
  }
}

function wireEvents(){
  $('#btn-line-login').addEventListener('click', () => liff.login({ redirectUri: window.location.href }));
  $('#btn-logout').addEventListener('click', logout);
  $$('.tab').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.view));
  });
  $('#btn-win').addEventListener('click',  () => recordResult('win'));
  $('#btn-lose').addEventListener('click', () => recordResult('lose'));
  $('#btn-scan-qr').addEventListener('click', openLineScanner);
}

function setupRecordTab(){}

// =================================================================
// EXTRACT RESULT — อ่าน result=win/lose จาก URL search string
// รองรับทุก format ที่ LIFF ใช้:
//   ?result=lose         → ตรงๆ
//   liff.state=?result=lose   → LIFF encode แบบ ?
//   liff.state=/result=lose   → LIFF encode แบบ /
//   liff.state=/?result=lose  → มี / และ ?
//   liff.state=/badminton/?result=lose → มี path เต็ม
// =================================================================
function extractResult(search){
  // 1) ลองตรงๆ ก่อน
  const direct = new URLSearchParams(search).get('result');
  if(direct === 'win' || direct === 'lose') return direct;

  // 2) ลอง decode liff.state
  const liffState = new URLSearchParams(search).get('liff.state');
  if(!liffState) return null;

  try{
    const decoded = decodeURIComponent(liffState);
    // หา query string: ตัดทุกอย่างก่อน ? (path) แล้วเอาส่วนหลัง ?
    const qIdx = decoded.indexOf('?');
    const qs   = qIdx !== -1
      ? decoded.slice(qIdx + 1)          // เอาหลัง ?
      : decoded.replace(/^[/?]+/, '');   // ไม่มี ? → ตัด / นำหน้า
    const r = new URLSearchParams(qs).get('result');
    if(r === 'win' || r === 'lose') return r;
  }catch(e){}

  return null;
}

// =================================================================
// BOOT
// =================================================================
async function boot(){
  _resultHandled = false; // reset ทุก page load
  wireEvents();

  // ══ ขั้นแรกสุด: จับ result จาก URL ก่อน liff.init แตะ URL ══
  // liff.init อาจ trigger redirect เต็ม → boot() restart ใหม่
  // การบันทึกลง localStorage ทำให้ค่ารอดผ่าน redirect ได้
  const preSearch = window.location.search;
  const preResult = extractResult(preSearch);
  if(preResult) localStorage.setItem('shuttle_pending_result', preResult);

  const cachedPlayer = localStorage.getItem('shuttle_player');
  const isLogout     = localStorage.getItem('shuttle_logout');

  // ══ FAST PATH ══ แสดง cache ทันทีเสมอ
  if(cachedPlayer && !isLogout){
    currentUser = JSON.parse(cachedPlayer);
    showApp();
    hideSplash();

    if(preResult === 'win' || preResult === 'lose'){
      // QR scan: แสดง ⏳ overlay ทันที (API จริงรอหลัง liff.init เสร็จ)
      showRecording('กำลังบันทึก...', '⏳');
      switchTab('weekly');
      loadCachedData();
    } else {
      loadCachedData();
    }
  }

  // liff.init (อาจ redirect หรือ rewrite URL)
  try{
    await liff.init({ liffId: LIFF_ID });
  }catch(err){
    console.error('LIFF init failed', err);
    if(!currentUser){ showLogin(); hideSplash(); }
    return;
  }

  // อ่าน resultParam จากทุกแหล่ง (เรียงตามความน่าเชื่อถือ)
  const resultParam =
    extractResult(window.location.search) || // หลัง liff.init decode
    preResult                              || // pre-init URL snapshot
    localStorage.getItem('shuttle_pending_result'); // รอดผ่าน redirect

  // เคลียร์ pending เสมอ (ไม่ให้ค้างข้าม session)
  localStorage.removeItem('shuttle_pending_result');

  if(!liff.isLoggedIn()){
    if(resultParam === 'win' || resultParam === 'lose'){
      // บันทึกก่อน login redirect (จะถูกอ่านใน boot() รอบหน้า)
      localStorage.setItem('shuttle_pending_result', resultParam);
      liff.login({ redirectUri: window.location.href });
      return;
    }
    currentUser = null;
    localStorage.removeItem('shuttle_player');
    showLogin();
    hideSplash();
    return;
  }

  await loginWithLIFF(resultParam);
}

document.addEventListener('DOMContentLoaded', boot);
</script>
