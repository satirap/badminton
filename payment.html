<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>เก็บเงิน — ก๊วนอยากตีแบด</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:      #0c0d10;
  --card:    #16181d;
  --card2:   #1c1e24;
  --input:   #1e2028;
  --border:  #2e3038;
  --ink:     #f5f3ee;
  --soft:    #c9c7c0;
  --mute:    #8e8c85;
  --accent:  #c8f135;
  --green:   #22c55e;
  --gbg:     #14532d;
  --gtxt:    #bbf7d0;
  --blue:    #3b82f6;
  --bbg:     #1e3a5f;
  --btxt:    #bfdbfe;
  --red:     #ef4444;
  --radius:  14px;
  --rsm:     10px;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:'DM Sans',system-ui,sans-serif;font-size:16px;
  line-height:1.45;-webkit-font-smoothing:antialiased}
body{min-height:100dvh}

.wrap{max-width:520px;margin:0 auto;padding:0 16px 120px}

/* ── Header card ── */
.header-card{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;margin:16px 0 12px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.header-card .brand{font-size:18px;font-weight:800;color:var(--ink);line-height:1.2}
.header-card .brand span{color:var(--accent)}
.header-card .date-box{text-align:right;flex:1;margin-right:8px}
.header-card .date-box .date-big{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:var(--ink)}
.header-card .date-box .date-sub{font-size:11px;color:var(--mute);margin-top:1px}
.history-icon-btn{
  width:44px;height:44px;border-radius:12px;flex-shrink:0;
  background:var(--card2);border:1.5px solid var(--border);
  color:var(--ink);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.history-icon-btn:active{transform:scale(.92);border-color:var(--accent)}
.back-btn{
  width:100%;padding:12px 16px;margin-bottom:12px;
  background:var(--card2);border:1.5px solid var(--border);border-radius:var(--rsm);
  color:var(--ink);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:8px;
}
.back-btn:active{background:var(--card)}

/* ── Amount-per-person bar ── */
.amount-bar{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1.5px solid var(--accent);
  border-radius:var(--radius);padding:14px 18px;margin-bottom:12px;
}
.amount-bar .amt-lbl{font-size:15px;font-weight:700;color:var(--ink);flex-shrink:0}
.amount-bar input{
  flex:1;width:100%;padding:10px 14px;border-radius:var(--rsm);
  border:1.5px solid var(--border);background:var(--input);color:var(--ink);
  font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:800;
  text-align:center;outline:none;min-width:0;
}
.amount-bar input:focus{border-color:var(--accent)}
.amount-bar .amt-unit{font-size:15px;font-weight:800;color:var(--accent);flex-shrink:0}

/* ── Summary bar ── */
.summary-bar{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
  margin-bottom:12px;
}
.summary-bar .s-item{
  background:var(--card2);border:1.5px solid var(--border);
  border-radius:var(--rsm);padding:12px 6px;text-align:center;
}
.summary-bar .s-num{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:800;line-height:1.1;color:var(--ink)}
.summary-bar .s-num .baht{font-size:12px;font-weight:700;opacity:.7;margin-left:2px}
.summary-bar .s-lbl{font-size:12px;color:var(--mute);margin-top:4px;font-weight:700}
.summary-bar .s-item.cash{border-color:var(--green)60}
.summary-bar .s-item.cash .s-num{color:var(--gtxt)}
.summary-bar .s-item.transfer{border-color:var(--blue)60}
.summary-bar .s-item.transfer .s-num{color:var(--btxt)}
.summary-bar .s-item.total{border-color:var(--accent)60}
.summary-bar .s-item.total .s-num{color:var(--accent)}

/* ── Player table ── */
.player-table{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}

.player-row{
  display:grid;grid-template-columns:36px 1fr auto auto auto;
  align-items:center;gap:8px;
  background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--rsm);padding:14px 12px;
  transition:border-color .2s;
}
.player-row.paid-both{border-color:var(--accent)30}
.player-row.paid-cash{border-color:var(--green)50}
.player-row.paid-transfer{border-color:var(--blue)50}

.player-row .num{
  font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;
  color:var(--mute);text-align:center;
}
.player-row .name{
  font-size:19px;font-weight:800;color:var(--ink);line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* Toggle buttons */
.pay-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:4px;
  padding:7px 10px;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:800;
  border:1.5px solid var(--border);background:var(--input);color:var(--mute);
  cursor:pointer;transition:all .15s;white-space:nowrap;min-width:64px;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.pay-btn:active{transform:scale(.95)}
.pay-btn.on.cash{background:var(--gbg);border-color:var(--green);color:var(--gtxt)}
.pay-btn.on.transfer{background:var(--bbg);border-color:var(--blue);color:var(--btxt)}

.del-btn{
  width:32px;height:32px;border-radius:8px;border:none;
  background:transparent;color:var(--mute);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.del-btn:active{background:#ef444420;color:var(--red)}

/* ── Add player form ── */
.add-form{
  display:flex;gap:8px;margin-bottom:12px;
}
.add-form input{
  flex:1;padding:14px 16px;border-radius:var(--rsm);
  border:1.5px solid var(--border);background:var(--input);
  color:var(--ink);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;
  outline:none;transition:border-color .15s;
}
.add-form input::placeholder{color:var(--mute)}
.add-form input:focus{border-color:var(--accent)}
.add-form .add-btn{
  padding:14px 18px;border-radius:var(--rsm);
  border:none;background:var(--accent);color:#111;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;flex-shrink:0;transition:opacity .15s;
}
.add-form .add-btn:active{opacity:.8}

/* ── Action buttons ── */
.action-row{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.btn-complete{
  width:100%;padding:18px;border-radius:var(--radius);border:none;
  background:var(--accent);color:#111;
  font-family:'DM Sans',sans-serif;font-size:17px;font-weight:800;
  cursor:pointer;transition:opacity .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-complete:active{opacity:.8}
.btn-complete:disabled{opacity:.4;cursor:not-allowed}
.btn-save{
  width:100%;padding:16px;border-radius:var(--radius);
  border:1.5px solid var(--accent);background:transparent;color:var(--accent);
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-save:active{background:#c8f13510}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
.btn-clear{
  width:100%;padding:14px;border-radius:var(--radius);
  border:1.5px solid var(--border);background:transparent;color:var(--soft);
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .15s;
}
.btn-clear:active{background:var(--card)}

/* ── History list ── */
.history-list{display:flex;flex-direction:column;gap:8px}
.history-card{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--radius);padding:16px 18px;
}
.history-card .hc-head{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;
}
.history-card .hc-date{font-size:15px;font-weight:800;color:var(--ink)}
.history-card .hc-badge{
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:20px;
}
.hc-badge.complete{background:#c8f13520;color:var(--accent);border:1px solid var(--accent)40}
.hc-badge.open{background:#fbbf2420;color:#fbbf24;border:1px solid #fbbf2440}
.history-card .hc-stats{
  display:flex;gap:16px;margin-bottom:12px;
}
.hc-stat{font-size:13px;color:var(--soft)}
.hc-stat strong{font-weight:800;color:var(--ink)}
.history-card .hc-names{
  font-size:12px;color:var(--mute);line-height:1.8;
  border-top:1px solid var(--border);padding-top:10px;
}
.history-card .hc-actions{display:flex;gap:8px;margin-top:12px}
.hc-btn{
  flex:1;padding:10px;border-radius:var(--rsm);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .15s;border:1.5px solid var(--border);
  background:var(--input);color:var(--soft);
}
.hc-btn.edit{border-color:var(--accent)60;color:var(--accent)}
.hc-btn:active{opacity:.7}

/* ── Empty state ── */
.empty{
  text-align:center;padding:48px 20px;
  color:var(--mute);font-size:15px;line-height:1.8;
}

/* ── Toast ── */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--accent);color:#111;
  padding:13px 24px;border-radius:100px;
  font-size:14px;font-weight:800;
  opacity:0;transition:transform .3s cubic-bezier(.2,.9,.3,1.3),opacity .3s;
  z-index:99;pointer-events:none;box-shadow:0 8px 24px #000a;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Saved chip ── */
.autosave{
  font-size:11px;color:var(--mute);text-align:center;
  padding:6px 0;font-family:'IBM Plex Mono',monospace;
}
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header-card">
    <div class="brand">ก๊วนอยาก<br><span>ตีแบด</span></div>
    <div class="date-box">
      <div class="date-big" id="date-big">—</div>
      <div class="date-sub">วันที่เก็บเงิน</div>
    </div>
    <button class="history-icon-btn" onclick="switchTab('history')" title="ประวัติ">📋</button>
  </div>

  <!-- ============ TAB: COLLECT ============ -->
  <div id="view-collect">

    <!-- Amount per person -->
    <div class="amount-bar">
      <span class="amt-lbl">ยอดต่อคน</span>
      <input type="number" id="per-person" value="0" min="0" step="10" inputmode="numeric"/>
      <span class="amt-unit">บาท</span>
    </div>

    <!-- Summary (in baht) -->
    <div class="summary-bar">
      <div class="s-item total">
        <div class="s-num" id="sum-total-baht">0<span class="baht">฿</span></div>
        <div class="s-lbl">รวมทั้งหมด</div>
      </div>
      <div class="s-item cash">
        <div class="s-num" id="sum-cash-baht">0<span class="baht">฿</span></div>
        <div class="s-lbl">💵 เงินสด</div>
      </div>
      <div class="s-item transfer">
        <div class="s-num" id="sum-transfer-baht">0<span class="baht">฿</span></div>
        <div class="s-lbl">📲 โอน</div>
      </div>
    </div>

    <!-- Player list -->
    <div class="player-table" id="player-table"></div>

    <!-- Add form -->
    <div class="add-form">
      <input type="text" id="name-input" placeholder="ชื่อสมาชิก..." maxlength="30" autocomplete="off"/>
      <button class="add-btn" onclick="addPlayer()">+ เพิ่ม</button>
    </div>

    <!-- Actions -->
    <div class="action-row">
      <button class="btn-save" id="btn-save" onclick="saveSessionNow()">
        💾 บันทึกรายการ
      </button>
      <button class="btn-complete" id="btn-complete" onclick="completeSession()" style="display:none">
        🎉 จบรอบ (จ่ายครบแล้ว)
      </button>
      <button class="btn-clear" onclick="clearSession()">🗑 ล้างรายชื่อทั้งหมด</button>
    </div>

    <div class="autosave" id="autosave-label"></div>
  </div>

  <!-- ============ TAB: HISTORY ============ -->
  <div id="view-history" style="display:none">
    <button class="back-btn" onclick="switchTab('collect')">← กลับหน้าเก็บเงิน</button>
    <h3 style="margin:0 0 12px;font-size:17px;color:var(--ink);font-weight:800">📋 ประวัติการเก็บเงิน</h3>
    <div class="history-list" id="history-list">
      <div class="empty">กำลังโหลด...</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ================================================================
   CONFIG
   ================================================================ */
const FIREBASE_CONFIG = {
  apiKey:            'AIzaSyCi2kIvaA9zk_2whDe-SlHW9ngnVWuIhEQ',
  authDomain:        'badminton-642a3.firebaseapp.com',
  projectId:         'badminton-642a3',
  storageBucket:     'badminton-642a3.firebasestorage.app',
  messagingSenderId: '65806979876',
  appId:             '1:65806979876:web:3ee9d17c6f0ede5b2819b1',
};

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

/* ================================================================
   STATE
   ================================================================ */
const DRAFT_KEY = 'payment_draft';

let session = null;   // { id, date, dateDisplay, status, players[], createdAt, completedAt }
let editingId = null; // Firestore doc ID being edited

/* ================================================================
   DATE HELPERS
   ================================================================ */
function todayISO(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function thaiDate(isoStr){
  const d = isoStr ? new Date(isoStr + 'T12:00:00') : new Date();
  return d.toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'});
}

function thaiDateShort(isoStr){
  const d = isoStr ? new Date(isoStr + 'T12:00:00') : new Date();
  return d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});
}

/* ================================================================
   SESSION MANAGEMENT
   ================================================================ */
function newSession(){
  const iso = todayISO();
  return {
    id:          null,
    date:        iso,
    dateDisplay: thaiDate(iso),
    status:      'open',
    perPerson:   0,
    players:     [],
    createdAt:   new Date().toISOString(),
    completedAt: null,
  };
}

function getPerPerson(){
  const v = parseInt(document.getElementById('per-person').value, 10);
  return isNaN(v) || v < 0 ? 0 : v;
}

function fmtBaht(n){
  return Math.round(n).toLocaleString('en-US');
}

function loadDraft(){
  try{
    const raw = localStorage.getItem(DRAFT_KEY);
    if(raw){
      session = JSON.parse(raw);
      // assign temp ids if missing
      session.players.forEach((p,i) => { if(!p.id) p.id = 'p'+Date.now()+i; });
      return true;
    }
  }catch(e){}
  return false;
}

function saveDraft(){
  try{ localStorage.setItem(DRAFT_KEY, JSON.stringify(session)); }catch(e){}
  updateAutosaveLabel('local');
  scheduleCloudSync();
}

function clearDraft(){
  localStorage.removeItem(DRAFT_KEY);
}

function updateAutosaveLabel(mode){
  const el = document.getElementById('autosave-label');
  if(!el) return;
  const now = new Date();
  const hhmm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  if(mode==='cloud') el.textContent = `☁️ บันทึกขึ้น cloud แล้ว ${hhmm}`;
  else if(mode==='syncing') el.textContent = `⏳ กำลังบันทึก...`;
  else if(mode==='error') el.textContent = `⚠️ บันทึก cloud ไม่สำเร็จ (local ok)`;
  else el.textContent = `💾 บันทึก local แล้ว ${hhmm}`;
}

/* ── Debounced auto-save to Firestore (กันกดเร็วเขียนบ่อย) ── */
let _syncTimer = null;
function scheduleCloudSync(){
  if(_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => { cloudSync().catch(e => console.warn('sync', e)); }, 800);
}

async function cloudSync(){
  if(!session || !session.players) return;
  // ไม่ sync session เปล่า (ยังไม่มีคน)
  if(session.players.length === 0 && !editingId) return;

  updateAutosaveLabel('syncing');
  try{
    const cashN   = session.players.filter(p => p.cash).length;
    const transN  = session.players.filter(p => p.transfer).length;
    const pp      = getPerPerson();
    const payload = {
      date:           session.date,
      dateDisplay:    session.dateDisplay,
      status:         session.status || 'open',
      players:        session.players,
      perPerson:      pp,
      cashCount:      cashN,
      transferCount:  transN,
      totalCount:     session.players.length,
      paidCount:      cashN + transN,
      cashAmount:     cashN * pp,
      transferAmount: transN * pp,
      totalAmount:    session.players.length * pp,
      createdAt:      session.createdAt ? new Date(session.createdAt) : new Date(),
      updatedAt:      new Date(),
    };
    if(editingId){
      await db.collection('payment_sessions').doc(editingId).set(payload, {merge:true});
    } else {
      const ref = await db.collection('payment_sessions').add(payload);
      editingId = ref.id;
      session.id = ref.id;
      try{ localStorage.setItem(DRAFT_KEY, JSON.stringify(session)); }catch(e){}
    }
    updateAutosaveLabel('cloud');
  }catch(e){
    updateAutosaveLabel('error');
    console.error('cloud sync', e);
  }
}

/** ค้นหา open session ของวันนี้ — ให้อีกคนที่เตรียมไว้ ใช้ต่อได้ */
async function loadTodayOpenSession(){
  try{
    const iso = todayISO();
    const snap = await db.collection('payment_sessions')
      .where('date','==',iso)
      .where('status','==','open')
      .limit(1).get();
    if(snap.empty) return false;
    const doc = snap.docs[0];
    const d = doc.data();
    editingId = doc.id;
    session = {
      id:          doc.id,
      date:        d.date || iso,
      dateDisplay: d.dateDisplay || thaiDate(iso),
      status:      'open',
      perPerson:   d.perPerson || 0,
      players:     (d.players||[]).map(p => ({...p, id: p.id||('p'+Math.random())})),
      createdAt:   d.createdAt?.toDate?.()?.toISOString() || new Date().toISOString(),
      completedAt: null,
    };
    try{ localStorage.setItem(DRAFT_KEY, JSON.stringify(session)); }catch(e){}
    return true;
  }catch(e){ console.warn('loadTodayOpenSession', e); return false; }
}

/** Save ทันทีโดยไม่รอ debounce */
async function saveSessionNow(){
  if(!session.players.length){ toast('ยังไม่มีรายชื่อ'); return; }
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '⏳ กำลังบันทึก...';
  if(_syncTimer){ clearTimeout(_syncTimer); _syncTimer = null; }
  try{
    await cloudSync();
    toast('บันทึกแล้ว ☁️');
  }catch(e){ toast('บันทึกไม่สำเร็จ: '+e.message); }
  btn.disabled = false;
  renderSummary(); // restore text
}

/* ================================================================
   PLAYER OPERATIONS
   ================================================================ */
function addPlayer(){
  const inp = document.getElementById('name-input');
  const name = inp.value.trim();
  if(!name){ inp.focus(); return; }
  session.players.push({ id:'p'+Date.now(), name, cash:false, transfer:false });
  inp.value = '';
  inp.focus();
  saveDraft();
  renderTable();
  renderSummary();
}

function deletePlayer(id){
  session.players = session.players.filter(p => p.id !== id);
  saveDraft();
  renderTable();
  renderSummary();
}

function togglePay(id, type){
  const p = session.players.find(p => p.id === id);
  if(!p) return;
  if(type === 'cash'){
    p.cash = !p.cash;
    if(p.cash) p.transfer = false; // เลือก cash → ยกเลิก transfer
  } else {
    p.transfer = !p.transfer;
    if(p.transfer) p.cash = false; // เลือก transfer → ยกเลิก cash
  }
  saveDraft();
  renderTable();
  renderSummary();
}

/* ================================================================
   RENDER
   ================================================================ */
function renderTable(){
  const el = document.getElementById('player-table');
  if(!session.players.length){
    el.innerHTML = '<div class="empty">ยังไม่มีรายชื่อ<br>เพิ่มด้านล่างได้เลยครับ</div>';
    return;
  }
  el.innerHTML = session.players.map((p,i) => {
    const rowClass = p.cash && p.transfer ? 'paid-both'
                   : p.cash ? 'paid-cash'
                   : p.transfer ? 'paid-transfer' : '';
    return `<div class="player-row ${rowClass}">
      <div class="num">${i+1}</div>
      <div class="name">${escHtml(p.name)}</div>
      <button class="pay-btn cash ${p.cash?'on':''}" onclick="togglePay('${p.id}','cash')">
        💵 เงินสด
      </button>
      <button class="pay-btn transfer ${p.transfer?'on':''}" onclick="togglePay('${p.id}','transfer')">
        📲 โอน
      </button>
      <button class="del-btn" onclick="deletePlayer('${p.id}')">✕</button>
    </div>`;
  }).join('');
}

function renderSummary(){
  const total    = session.players.length;
  const cashN    = session.players.filter(p => p.cash).length;
  const transN   = session.players.filter(p => p.transfer).length;
  const paidN    = cashN + transN;
  const pp       = getPerPerson();
  const totalB   = total * pp;
  const cashB    = cashN * pp;
  const transB   = transN * pp;

  document.getElementById('sum-total-baht').innerHTML    = `${fmtBaht(totalB)}<span class="baht">฿</span>`;
  document.getElementById('sum-cash-baht').innerHTML     = `${fmtBaht(cashB)}<span class="baht">฿</span>`;
  document.getElementById('sum-transfer-baht').innerHTML = `${fmtBaht(transB)}<span class="baht">฿</span>`;

  // Save button: disable when no players
  const saveBtn = document.getElementById('btn-save');
  if(saveBtn){
    saveBtn.disabled = total === 0;
    saveBtn.textContent = total === 0
      ? '💾 บันทึกรายการ'
      : `💾 บันทึกรายการ (${paidN}/${total} จ่าย · ${fmtBaht(cashB+transB)}฿)`;
  }

  // Finish button: only show when everyone paid
  const finBtn = document.getElementById('btn-complete');
  if(finBtn){
    const allPaid = total > 0 && paidN >= total;
    finBtn.style.display = allPaid ? 'flex' : 'none';
    finBtn.textContent   = `🎉 จบรอบ · ${total} คน · ${fmtBaht(totalB)}฿`;
  }
}

function renderDate(){
  const el = document.getElementById('date-big');
  if(el) el.textContent = thaiDateShort(session?.date || todayISO());
}

/* ================================================================
   COMPLETE / CLEAR SESSION
   ================================================================ */
async function completeSession(){
  if(!session.players.length){ toast('ยังไม่มีรายชื่อ'); return; }
  const cashN  = session.players.filter(p => p.cash).length;
  const transN = session.players.filter(p => p.transfer).length;
  const paidN  = cashN + transN;
  if(paidN < session.players.length){ toast('ยังไม่จ่ายครบ'); return; }
  if(!confirm('จบรอบเก็บเงิน (ทุกคนจ่ายครบแล้ว)?')) return;

  const btn = document.getElementById('btn-complete');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังจบรอบ...';
  if(_syncTimer){ clearTimeout(_syncTimer); _syncTimer = null; }

  try{
    session.status = 'complete';
    const pp = getPerPerson();
    const payload = {
      date:        session.date,
      dateDisplay: session.dateDisplay,
      status:      'complete',
      players:     session.players,
      perPerson:   pp,
      cashCount:   cashN,
      transferCount: transN,
      totalCount:  session.players.length,
      paidCount:   paidN,
      cashAmount:     cashN * pp,
      transferAmount: transN * pp,
      totalAmount:    session.players.length * pp,
      createdAt:   session.createdAt ? new Date(session.createdAt) : new Date(),
      completedAt: new Date(),
      updatedAt:   new Date(),
    };
    if(editingId){
      await db.collection('payment_sessions').doc(editingId).set(payload, {merge:true});
    } else {
      const ref = await db.collection('payment_sessions').add(payload);
      editingId = ref.id;
    }
    clearDraft();
    toast('🎉 จบรอบเรียบร้อย');
    setTimeout(() => {
      editingId = null;
      session = newSession();
      try{ localStorage.setItem(DRAFT_KEY, JSON.stringify(session)); }catch(e){}
      document.getElementById('per-person').value = 0;
      renderTable();
      renderSummary();
      renderDate();
      document.getElementById('autosave-label').textContent = '';
    }, 1500);
  }catch(e){
    console.error(e);
    toast('จบรอบไม่สำเร็จ: ' + e.message);
    btn.disabled = false;
    renderSummary();
  }
}

function clearSession(){
  if(!session.players.length) return;
  if(!confirm('ล้างรายชื่อทั้งหมด?')) return;
  editingId = null;
  session = newSession();
  saveDraft();
  renderTable();
  renderSummary();
  renderDate();
}

/* ================================================================
   HISTORY
   ================================================================ */
async function loadHistory(){
  const el = document.getElementById('history-list');
  el.innerHTML = '<div class="empty">กำลังโหลด...</div>';
  try{
    const snap = await db.collection('payment_sessions')
      .orderBy('createdAt','desc').limit(30).get();
    if(snap.empty){ el.innerHTML = '<div class="empty">ยังไม่มีประวัติ</div>'; return; }
    el.innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      const names = (d.players||[]).map(p => {
        const icon = p.cash ? '💵' : p.transfer ? '📲' : '⬜';
        return `${icon} ${escHtml(p.name)}`;
      }).join('  ');
      const badge = d.status==='complete'
        ? '<span class="hc-badge complete">จ่ายครบ</span>'
        : '<span class="hc-badge open">กำลังเก็บ</span>';
      return `<div class="history-card">
        <div class="hc-head">
          <div class="hc-date">${escHtml(d.dateDisplay||d.date||'')}</div>
          ${badge}
        </div>
        <div class="hc-stats" style="flex-wrap:wrap;gap:8px 14px">
          <span class="hc-stat">รวม <strong>${d.totalCount||0} คน · ${fmtBaht(d.totalAmount||0)}฿</strong></span>
          <span class="hc-stat" style="color:#bbf7d0">💵 <strong>${fmtBaht(d.cashAmount||0)}฿</strong> (${d.cashCount||0})</span>
          <span class="hc-stat" style="color:#bfdbfe">📲 <strong>${fmtBaht(d.transferAmount||0)}฿</strong> (${d.transferCount||0})</span>
        </div>
        <div style="font-size:11px;color:var(--mute);margin-top:-4px;margin-bottom:8px">ยอดต่อคน ${d.perPerson||0} บาท · ยังไม่จ่าย ${(d.totalCount||0)-(d.paidCount||0)} คน</div>
        <div class="hc-names">${names||'—'}</div>
        <div class="hc-actions">
          <button class="hc-btn edit" onclick="editSession('${doc.id}')">✏️ แก้ไข</button>
          <button class="hc-btn" onclick="deleteSession('${doc.id}',this)">🗑 ลบ</button>
        </div>
      </div>`;
    }).join('');
  }catch(e){ el.innerHTML = `<div class="empty">โหลดไม่ได้: ${e.message}</div>`; }
}

async function editSession(docId){
  try{
    const snap = await db.collection('payment_sessions').doc(docId).get();
    if(!snap.exists){ toast('ไม่พบข้อมูล'); return; }
    const d = snap.data();
    editingId = docId;
    session = {
      id:          docId,
      date:        d.date,
      dateDisplay: d.dateDisplay || thaiDate(d.date),
      status:      'open',
      perPerson:   d.perPerson || 0,
      players:     (d.players||[]).map(p => ({...p, id: p.id||('p'+Math.random())})),
      createdAt:   d.createdAt?.toDate?.()?.toISOString() || new Date().toISOString(),
      completedAt: null,
    };
    saveDraft();
    switchTab('collect');
    renderDate();
    document.getElementById('per-person').value = session.perPerson || 0;
    renderTable();
    renderSummary();
    toast('โหลดข้อมูลแล้ว ✏️ แก้ไขได้เลย');
  }catch(e){ toast('เกิดข้อผิดพลาด: '+e.message); }
}

async function deleteSession(docId, btn){
  if(!confirm('ลบประวัตินี้?')) return;
  btn.disabled = true;
  try{
    await db.collection('payment_sessions').doc(docId).delete();
    toast('ลบแล้ว');
    loadHistory();
  }catch(e){ toast('ลบไม่ได้: '+e.message); btn.disabled=false; }
}

/* ================================================================
   TAB NAVIGATION
   ================================================================ */
function switchTab(tab){
  document.getElementById('view-collect').style.display  = tab==='collect' ? 'block' : 'none';
  document.getElementById('view-history').style.display  = tab==='history' ? 'block' : 'none';
  if(tab==='history') loadHistory();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ================================================================
   UTILS
   ================================================================ */
function escHtml(s){
  return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toast(msg,dur=2500){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toast._t); toast._t=setTimeout(()=>el.classList.remove('show'),dur);
}

/* ================================================================
   ENTER KEY
   ================================================================ */
document.getElementById('name-input').addEventListener('keydown', e => {
  if(e.key==='Enter') addPlayer();
});

document.getElementById('per-person').addEventListener('input', () => {
  session.perPerson = getPerPerson();
  saveDraft();
  renderSummary();
});

/* ================================================================
   BOOT
   ================================================================ */
(async function boot(){
  // 1) พยายามโหลด open session ของวันนี้จาก cloud ก่อน (คนเตรียมอาจเป็นคนละคน)
  const loadedFromCloud = await loadTodayOpenSession();

  if(!loadedFromCloud){
    // 2) ไม่เจอบน cloud → ใช้ draft local ถ้ามี (เฉพาะของวันนี้)
    if(loadDraft()){
      if(session.date !== todayISO()){
        // draft ของวันอื่น (ค้างอยู่) → เริ่มใหม่
        session = newSession();
      }
    } else {
      session = newSession();
    }
  }

  document.getElementById('per-person').value = session.perPerson || 0;
  renderDate();
  renderTable();
  renderSummary();
  if(loadedFromCloud) updateAutosaveLabel('cloud');
})();
</script>
</body>
